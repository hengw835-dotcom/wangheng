name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_MODE: real
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
          VITE_BAIDU_MAP_AK: ${{ vars.VITE_BAIDU_MAP_AK || secrets.VITE_BAIDU_MAP_AK }}
          VITE_AMAP_KEY: ${{ vars.VITE_AMAP_KEY || secrets.VITE_AMAP_KEY }}
          VITE_OPENWEATHER_API_KEY: ${{ vars.VITE_OPENWEATHER_API_KEY || secrets.VITE_OPENWEATHER_API_KEY }}
        run: npm run build:linux -- --base="/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
