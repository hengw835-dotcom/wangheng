<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>百度地图测试</title>
    <!-- 百度地图API -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=replace-with-baidu-map-ak"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
      }
      #map {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      console.log('开始测试百度地图API...');
      console.log('window.BMap:', !!window.BMap);
      
      if (window.BMap) {
        try {
          var map = new BMap.Map("map");
          var point = new BMap.Point(108.94, 34.26);
          map.centerAndZoom(point, 13);
          map.enableScrollWheelZoom(true);
          console.log('地图初始化成功');
        } catch (error) {
          console.error('地图初始化错误:', error);
        }
      } else {
        console.error('BMap未加载');
      }
    </script>
  </body>
</html>
