services:
  - type: web
    name: smart-harvester-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: demo
      - key: JWT_SECRET
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: AdminDemo2026!
      - key: DISPATCHER_USERNAME
        value: dispatcher
      - key: DISPATCHER_PASSWORD
        value: DispatcherDemo2026!
      - key: DRIVER_USERNAME
        value: driver
      - key: DRIVER_PASSWORD
        value: DriverDemo2026!
      - key: VIEWER_USERNAME
        value: viewer
      - key: VIEWER_PASSWORD
        value: ViewerDemo2026!
      - key: AI_VISION_MODE
        value: demo
      - key: NAVIGATION_MODE
        value: demo
      - key: CONTROL_MODE
        value: demo
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://smart-harvester-web.onrender.com,https://hengw835-dotcom.github.io,http://localhost:3000

  - type: web
    name: smart-harvester-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build:linux
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_MODE
        value: real
      - key: VITE_API_BASE_URL
        value: https://smart-harvester-api.onrender.com
