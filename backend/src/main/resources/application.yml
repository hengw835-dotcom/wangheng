server:
  port: ${SERVER_PORT:8086}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smart_harvester?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  security:
    jwt-secret: ${JWT_SECRET}
    metrics-token: ${METRICS_TOKEN}
    token-ttl-minutes: ${JWT_TTL_MINUTES:60}
    users:
      admin:
        username: ${ADMIN_USERNAME}
        password: ${ADMIN_PASSWORD}
      dispatcher:
        username: ${DISPATCHER_USERNAME}
        password: ${DISPATCHER_PASSWORD}
      driver:
        username: ${DRIVER_USERNAME}
        password: ${DRIVER_PASSWORD}
      viewer:
        username: ${VIEWER_USERNAME}
        password: ${VIEWER_PASSWORD}
    rate-limit:
      requests: ${RATE_LIMIT_REQUESTS:120}
      window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  capabilities:
    ai-vision: ${AI_VISION_MODE:demo}
    navigation: ${NAVIGATION_MODE:demo}
    control: ${CONTROL_MODE:demo}
  sensor-simulator:
    interval-ms: ${SENSOR_SIMULATOR_INTERVAL_MS:5000}

# YOLO 模型配置
yolo:
  model:
    path: models/yolov8n.onnx
  confidence:
    threshold: 0.45
  iou:
    threshold: 0.45
  input:
    width: 640
    height: 640

# MQTT 配置 - 支持连接 MQTTX
mqtt:
  broker: ${MQTT_BROKER:tcp://localhost:1883}
  clientId: smart-harvester-${random.uuid}
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:public}
  ssl:
    enabled: false
    trust-store: classpath:certs/ca.crt
    cert-file: classpath:certs/client.crt
    key-file: classpath:certs/client.key
  connection:
    timeout: 10
    keepalive: 60
    clean-session: false
    auto-reconnect: true
    max-reconnect-interval: 60
    reconnect-delay: 5
  qos: 1
  topics:
    - harvester/+/status
    - harvester/+/sensor
    - harvester/+/control/ack
    - harvester/ai/vision
    - harvester/task/update

websocket:
  enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
