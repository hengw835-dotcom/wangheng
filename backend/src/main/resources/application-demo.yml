server:
  port: ${PORT:8086}

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/smart_harvester_demo;MODE=MySQL;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=VALUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  security:
    jwt-secret: ${JWT_SECRET:demo-smart-harvester-jwt-secret-2026-minimum-32-chars}
    metrics-token: ${METRICS_TOKEN:demo-metrics-token-2026-public-demo}
    token-ttl-minutes: ${JWT_TTL_MINUTES:120}
    users:
      admin:
        username: ${ADMIN_USERNAME:admin}
        password: ${ADMIN_PASSWORD:AdminDemo2026!}
      dispatcher:
        username: ${DISPATCHER_USERNAME:dispatcher}
        password: ${DISPATCHER_PASSWORD:DispatcherDemo2026!}
      driver:
        username: ${DRIVER_USERNAME:driver}
        password: ${DRIVER_PASSWORD:DriverDemo2026!}
      viewer:
        username: ${VIEWER_USERNAME:viewer}
        password: ${VIEWER_PASSWORD:ViewerDemo2026!}
    rate-limit:
      requests: ${RATE_LIMIT_REQUESTS:300}
      window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  capabilities:
    ai-vision: ${AI_VISION_MODE:demo}
    navigation: ${NAVIGATION_MODE:demo}
    control: ${CONTROL_MODE:demo}
  sensor-simulator:
    interval-ms: ${SENSOR_SIMULATOR_INTERVAL_MS:5000}

mqtt:
  broker: ${MQTT_BROKER:tcp://127.0.0.1:1883}
  clientId: ${MQTT_CLIENT_ID:smart-harvester-demo}
  username: ${MQTT_USERNAME:demo}
  password: ${MQTT_PASSWORD:demo}
  ssl:
    enabled: false
  connection:
    timeout: 5
    keepalive: 20
    clean-session: true
    auto-reconnect: false
  qos: 1
  topics:
    - harvester/+/status
    - harvester/+/sensor
    - harvester/+/control/ack
    - harvester/ai/vision
    - harvester/task/update

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false