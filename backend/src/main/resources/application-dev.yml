spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/smart_harvester_dev;MODE=MySQL;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=VALUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  security:
    jwt-secret: ${JWT_SECRET:dev-smart-harvester-jwt-secret-2026-minimum-32-chars}
    metrics-token: ${METRICS_TOKEN:dev-metrics-token-2026-local}
    users:
      admin:
        username: ${ADMIN_USERNAME:admin}
        password: ${ADMIN_PASSWORD:20031107}
      dispatcher:
        username: ${DISPATCHER_USERNAME:dispatcher}
        password: ${DISPATCHER_PASSWORD:Dispatcher2026!}
      driver:
        username: ${DRIVER_USERNAME:driver}
        password: ${DRIVER_PASSWORD:DriverPass2026!}
      viewer:
        username: ${VIEWER_USERNAME:viewer}
        password: ${VIEWER_PASSWORD:ViewerPass2026!}

mqtt:
  broker: ${MQTT_BROKER:tcp://localhost:1883}
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:public}

management:
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
